name: javadoc-auto

on:
  push:
    branches: [stable]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: generar javadoc
        run: javadoc -d docs -sourcepath src/main/java -subpackages com.tt1.test

      - name: publicar
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages

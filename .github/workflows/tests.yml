name: tests-and-sync

on:
  push:
    branches: [main]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: run tests
        run: mvn test

      - name: sync to early
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git checkout early
          git merge main
          git push origin early
